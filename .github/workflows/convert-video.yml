name: Convert Video to PixelRenderer

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL (leave empty to use a local video file)'
        required: false
        default: ''
      video_path:
        description: 'Path to video in repo (used if no YouTube URL, e.g. videos/input.mp4)'
        required: false
        default: 'videos/input.mp4'
      download_resolution:
        description: 'YouTube download resolution (720/1080/480/360)'
        required: false
        default: '720'
      preset:
        description: 'PixelRenderer preset (p16/p32/p48/p64/p96/p128/p240/p360/p480/p720)'
        required: true
        default: 'p360'
      fps:
        description: 'Target FPS (max 50)'
        required: true
        default: '40'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Disable Git LFS
        run: |
          echo "# no LFS" > .gitattributes
          echo "*.json -text filter= diff= merge=" >> .gitattributes
          echo "*.bin -text filter= diff= merge=" >> .gitattributes
          echo "*.lua -text filter= diff= merge=" >> .gitattributes
          echo "*.mp4 -text filter= diff= merge=" >> .gitattributes
          git add .gitattributes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: |
          pip install opencv-python-headless numpy pillow lz4 yt-dlp ffmpeg

      - name: Determine video source
        id: video
        run: |
          if [ -n "${{ github.event.inputs.youtube_url }}" ]; then
            echo "Downloading from YouTube: ${{ github.event.inputs.youtube_url }}"
            RES="${{ github.event.inputs.download_resolution }}"
            if [ -z "$RES" ]; then RES="720"; fi
            echo "Download resolution: ${RES}p"
            yt-dlp \
              --extractor-args "youtube:player_client=ios,tv,web_safari,default" \
              -S "res:${RES}" \
              -f "bestvideo+bestaudio/best" \
              --merge-output-format mp4 \
              -o "videos/downloaded.mp4" \
              --no-check-certificates \
              --geo-bypass \
              "${{ github.event.inputs.youtube_url }}" || {
              echo "yt-dlp failed, trying youtube-dl as fallback..."
              pip install youtube-dl
              youtube-dl -f "best" -o "videos/downloaded.mp4" "${{ github.event.inputs.youtube_url }}"
            }
            echo "path=videos/downloaded.mp4" >> $GITHUB_OUTPUT
            echo "name=downloaded" >> $GITHUB_OUTPUT
          else
            VIDEO="${{ github.event.inputs.video_path }}"
            if [ ! -f "$VIDEO" ]; then
              VIDEO=$(ls -t videos/*.mp4 videos/*.avi videos/*.mov videos/*.mkv 2>/dev/null | head -1)
              if [ -z "$VIDEO" ]; then
                echo "No video found. Either provide a YouTube URL or upload a video to videos/"
                exit 1
              fi
            fi
            echo "path=$VIDEO" >> $GITHUB_OUTPUT
            echo "name=$(basename "$VIDEO" | sed 's/\.[^.]*$//')" >> $GITHUB_OUTPUT
          fi
          echo "preset=${{ github.event.inputs.preset }}" >> $GITHUB_OUTPUT
          echo "fps=${{ github.event.inputs.fps }}" >> $GITHUB_OUTPUT

      - name: Convert video to chunks
        run: |
          rm -rf "output/${{ steps.video.outputs.name }}"
          python3 converter.py "${{ steps.video.outputs.path }}" \
            -o "output/${{ steps.video.outputs.name }}" \
            --preset "${{ steps.video.outputs.preset }}" \
            --fps "${{ steps.video.outputs.fps }}" \
            --chunk-frames 4 \
            --delta-tolerance 8

      - name: Generate LocalScript
        run: |
          python3 generate_localscript.py \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --video-name "${{ steps.video.outputs.name }}" \
            --output "output/${{ steps.video.outputs.name }}/LocalScript.lua"

      - name: Copy module files
        run: |
          cp PixelRenderer.lua "output/${{ steps.video.outputs.name }}/"
          cp PixelRendererServer.lua "output/${{ steps.video.outputs.name }}/"
          cp example_server.lua "output/${{ steps.video.outputs.name }}/"

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Convert: ${{ steps.video.outputs.name }}" || echo "nothing to commit"
          git push
